# prod: TLS-сертификаты + политики перезапуска
#
# запуск:
#   DOMAIN=yourdomain.com docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# перед первым запуском получить TLS-сертификат:
#   certbot certonly --standalone -d yourdomain.com
#
# переменная DOMAIN должна совпадать с именем директории в /etc/letsencrypt/live/
#
# Object storage: в production переопределите APP_S3_* переменными окружения на реальный
# S3 / Yandex Object Storage. Обязательно:
#   - APP_S3_ENDPOINT_URL=https://… + APP_S3_USE_SSL=true (TLS app↔хранилище);
#   - APP_S3_ACCESS_KEY/SECRET — scoped креды с политикой только на bucket (не root);
#   - шифрование at-rest + lifecycle/retention — дефолтными политиками bucket у провайдера.


services:
  web-proxy:
    restart: always
    volumes:
      - /etc/letsencrypt/live/${DOMAIN}/fullchain.pem:/etc/nginx/certs/cert.pem:ro
      - /etc/letsencrypt/live/${DOMAIN}/privkey.pem:/etc/nginx/certs/key.pem:ro

  app:
    build:
      context: ./app
      target: production
    restart: always

  worker-1:
    restart: always

  worker-2:
    restart: always

  frontend:
    restart: always

  database:
    restart: always

  rabbitmq:
    restart: always
